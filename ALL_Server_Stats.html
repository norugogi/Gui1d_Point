<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전체서버 통계</title>
  <style>
    :root {
      --bg: #1e1f24;
      --panel: #2a2b30;
      --inner: #1f2227;
      --line: rgba(255,255,255,0.12);
      --text: #f4f7ff;
      --muted: #b9c1d3;
      --accent: #d4af37;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans KR", "Segoe UI", "Malgun Gothic", sans-serif;
      padding: 16px;
    }

    .page-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: 800;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab-btn {
      border: 1px solid var(--line);
      background: #303544;
      color: #eef2ff;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #111;
      border-color: rgba(0,0,0,0.15);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      justify-items: center;
    }

    .box {
      background: var(--inner);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      width: min(1240px, 94%);
    }

    .box-title {
      margin: 0;
      padding: 10px 12px;
      font-size: 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-align: left;
      font-size: 14px;
    }

    th { color: #dfe6fa; }
    td { color: #f7f9ff; }

    #statsBody tr {
      cursor: pointer;
      transition: background-color .15s ease;
    }

    #statsBody tr:hover { background: rgba(255,255,255,0.04); }
    #statsBody tr.active { background: rgba(212,175,55,0.16); }

    .right { text-align: right; }

    /* 통계표 헤더 컬럼별 색상 구분 */
    .stats-table thead th {
      text-align: center;
      color: #f8fbff;
      font-weight: 800;
    }
    .stats-table thead th:nth-child(1) { background: #243047; }
    .stats-table thead th:nth-child(2) { background: #2f3344; }
    .stats-table thead th:nth-child(3) { background: #2b3c33; }

    .stats-table tbody td {
      text-align: center;
      font-size: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
    }

    .count {
      font-size: 13px;
      color: var(--muted);
    }

    .empty {
      padding: 18px 12px;
      color: var(--muted);
    }

    .more-wrap {
      display: flex;
      justify-content: center;
      padding: 12px;
    }

    #loadMoreBtn {
      border: 1px solid var(--line);
      background: #333949;
      color: #f3f6ff;
      border-radius: 8px;
      padding: 8px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    #loadMoreBtn:hover { filter: brightness(1.08); }

    @media (max-width: 980px) {
      th, td { font-size: 13px; padding: 8px 9px; }
      h2 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <section class="page-wrap">
    <h2>전체서버 통계</h2>

    <div class="tabs">
      <button class="tab-btn active" data-tab="level" type="button">레벨 통계</button>
      <button class="tab-btn" data-tab="grade" type="button">토벌 통계</button>
      <button class="tab-btn" data-tab="class" type="button">직업 통계</button>
    </div>

    <div class="layout">
      <div class="box">
        <h3 class="box-title" id="statsTitle">레벨 통계</h3>
        <table class="stats-table">
          <thead>
            <tr>
              <th id="statsColName">구분</th>
              <th class="right">인원</th>
              <th class="right">비율</th>
            </tr>
          </thead>
          <tbody id="statsBody"></tbody>
        </table>
      </div>

      <div class="box">
        <div class="list-head">
          <strong id="playersTitle">대상 인원</strong>
          <span id="playersCount" class="count">0명</span>
        </div>

        <table class="players-table">
          <thead>
            <tr>
              <th>닉네임</th>
              <th>결사</th>
              <th>직업</th>
              <th class="right">Lv</th>
              <th class="right">토벌</th>
              <th>서버</th>
            </tr>
          </thead>
          <tbody id="playersBody"></tbody>
        </table>

        <div id="playersEmpty" class="empty">통계 항목을 선택하면 인원 목록이 표시됩니다.</div>

        <div class="more-wrap">
          <button id="loadMoreBtn" type="button" style="display:none;">더보기</button>
        </div>
      </div>
    </div>
  </section>

  <script src="js/ALL_Server_Stats.js"></script>
</body>
</html>
