<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 프로필</title>
  <link rel="stylesheet" href="css/Card_Profile.css">
  <script src="js/access-gate.js"></script>
</head>
<body>
  <main class="profile-main">
    <section class="profile-header">
      <h1>카드 프로필</h1>
      <p>결사원 카드를 클릭하면 뒷면 정보(전투력/결사등급/특징)를 볼 수 있습니다.</p>
      <div class="profile-search">
        <input id="cardSearchInput" type="text" placeholder="닉네임 검색">
        <button id="cardSearchBtn" class="profile-btn" type="button">검색</button>
      </div>
    </section>

    <section class="profile-grid-wrap">
      <div id="profileGrid" class="profile-grid"></div>
    </section>

    <div class="profile-footer">
      <button id="loadMoreBtn" class="profile-btn" type="button">더보기</button>
    </div>
  </main>

  <script src="js/Card_Profile.js"></script>
</body>
</html>
