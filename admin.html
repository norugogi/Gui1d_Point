<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원 관리</title>
  <script src="js/access-gate.js"></script>
  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      color: #f2f4f8;
      font-family: "Noto Sans KR", "Segoe UI", "Malgun Gothic", sans-serif;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      background: #252934;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 18px;
    }
    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    h2 { margin: 0; }
    p { margin: 0 0 12px; color: #c3c7d2; }
    .list { display: grid; gap: 10px; }
    .item {
      background: #1d212a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .name { font-weight: 700; }
    .email { color: #c3c7d2; font-size: 13px; }
    .actions { display: flex; gap: 8px; align-items: center; }
    button, select {
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 700;
      font-family: inherit;
    }
    select {
      background: #303645;
      color: #f2f4f8;
      border: 1px solid rgba(255,255,255,0.16);
      min-width: 132px;
      font-weight: 600;
    }
    button { cursor: pointer; }
    .save { background: #d4af37; color: #111; }
    .logout { background: #3b4252; color: #fff; }
    .muted { color: #c3c7d2; }
    .role-badge {
      display: inline-block;
      margin-left: 8px;
      font-size: 12px;
      color: #c3c7d2;
    }
    .filter-row {
      display: flex;
      gap: 8px;
      margin: 0 0 12px;
    }
    .filter-btn {
      background: #3b4252;
      color: #fff;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .filter-btn.active {
      background: #d4af37;
      color: #111;
    }
    .filter-count {
      display: inline-block;
      min-width: 22px;
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(255,255,255,0.16);
      color: #fff;
      text-align: center;
    }
    .filter-btn.active .filter-count {
      background: rgba(0,0,0,0.2);
      color: #111;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="head">
        <h2>회원 관리</h2>
        <button id="logoutBtn" class="logout" type="button">로그아웃</button>
      </div>
      <p id="desc" class="muted">회원구분(role)을 선택하고 권한을 변경할 수 있습니다.</p>
      <div class="filter-row">
        <button id="approvedFilterBtn" class="filter-btn active" type="button">승인 회원 <span id="approvedFilterCount" class="filter-count">0</span></button>
        <button id="pendingFilterBtn" class="filter-btn" type="button">승인 필요 <span id="pendingFilterCount" class="filter-count">0</span></button>
      </div>
      <div id="memberList" class="list">
        <div class="muted">불러오는 중...</div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCN1SqXwZWf7Z9r2oMrJGKF0pxfl4zBeTc",
      authDomain: "gui1d-point-db.firebaseapp.com",
      projectId: "gui1d-point-db"
    };

    const ROLE_OPTIONS = ["manager", "approved", "pending", "rejected"];

    const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const listEl = document.getElementById("memberList");
    const descEl = document.getElementById("desc");
    const logoutBtn = document.getElementById("logoutBtn");
    const approvedFilterBtn = document.getElementById("approvedFilterBtn");
    const pendingFilterBtn = document.getElementById("pendingFilterBtn");
    const approvedFilterCount = document.getElementById("approvedFilterCount");
    const pendingFilterCount = document.getElementById("pendingFilterCount");

    let myRole = "pending";
    let currentFilter = "approved";
    let allRows = [];

    function renderNoAccess() {
      descEl.textContent = "관리자/매니저 계정만 접근 가능합니다.";
      listEl.innerHTML = '<div class="muted">접근 권한이 없습니다.</div>';
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function roleOptionsHtml(selected) {
      const options = [];
      if (selected === "admin") {
        options.push('<option value="admin" selected disabled>admin</option>');
      }

      return options.concat(ROLE_OPTIONS
        .map((role) => {
          const selectedAttr = role === selected ? "selected" : "";
          return `<option value="${role}" ${selectedAttr}>${role}</option>`;
        })
      ).join("");
    }

    function getFilteredRows(rows) {
      if (currentFilter === "approved") {
        return rows.filter((r) => ["admin", "manager", "approved"].includes(String(r.role || "pending")));
      }
      return rows.filter((r) => ["pending", "rejected"].includes(String(r.role || "pending")));
    }

    function updateFilterCounts(rows) {
      const approvedCount = rows.filter((r) => ["admin", "manager", "approved"].includes(String(r.role || "pending"))).length;
      const pendingCount = rows.filter((r) => ["pending", "rejected"].includes(String(r.role || "pending"))).length;
      if (approvedFilterCount) approvedFilterCount.textContent = String(approvedCount);
      if (pendingFilterCount) pendingFilterCount.textContent = String(pendingCount);
    }

    function renderRows(rows) {
      const filteredRows = getFilteredRows(rows);
      updateFilterCounts(rows);

      approvedFilterBtn.classList.toggle("active", currentFilter === "approved");
      pendingFilterBtn.classList.toggle("active", currentFilter === "pending");

      if (!rows.length) {
        listEl.innerHTML = '<div class="muted">회원 데이터가 없습니다.</div>';
        return;
      }

      if (!filteredRows.length) {
        listEl.innerHTML = '<div class="muted">해당 조건의 회원이 없습니다.</div>';
        return;
      }

      listEl.innerHTML = filteredRows.map((r) => {
        const role = String(r.role || "approved");
        const isMe = r.id === auth.currentUser?.uid;
        const managerMode = myRole === "manager";
        const targetIsAdmin = role === "admin";

        // admin 계정은 유일 계정으로 고정(목록에서 선택/변경 불가)
        const disableSelect = targetIsAdmin || (managerMode && isMe);
        const disableSave = targetIsAdmin || (managerMode && isMe);

        return `
          <div class="item">
            <div>
              <div class="name">${escapeHtml(r.nickname || "-")}
                <span class="role-badge">현재: ${escapeHtml(role)}</span>
              </div>
              <div class="email">${escapeHtml(r.email || "-")}</div>
            </div>
            <div class="actions">
              <select data-role-select="${r.id}" ${disableSelect ? "disabled" : ""}>
                ${roleOptionsHtml(role)}
              </select>
              <button class="save" data-save="${r.id}" ${disableSave ? "disabled" : ""} type="button">권한 변경</button>
            </div>
          </div>
        `;
      }).join("");

      listEl.querySelectorAll("[data-save]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-save");
          const select = listEl.querySelector(`[data-role-select="${id}"]`);
          if (!id || !select) return;

          const nextRole = String(select.value || "approved");
          const currentUserId = auth.currentUser?.uid || "";

          if (nextRole === "admin") {
            window.alert("admin 권한은 목록에서 지정할 수 없습니다.");
            return;
          }
          if (myRole === "manager" && id === currentUserId) {
            window.alert("매니저 계정은 본인 권한을 변경할 수 없습니다.");
            return;
          }

          try {
            await updateDoc(doc(db, "users", id), { role: nextRole });
          } catch (err) {
            window.alert("권한 변경 실패: " + String(err));
          }
        });
      });
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        renderNoAccess();
        return;
      }

      const meSnap = await getDoc(doc(db, "users", user.uid));
      myRole = String(meSnap.data()?.role || "pending");
      if (myRole !== "admin" && myRole !== "manager") {
        renderNoAccess();
        return;
      }

      descEl.textContent = "회원구분을 선택한 뒤 [권한 변경] 버튼으로 즉시 반영됩니다.";

      onSnapshot(collection(db, "users"), (snap) => {
        allRows = snap.docs
          .map((d) => ({ id: d.id, ...d.data() }))
          .sort((a, b) => String(a.nickname || "").localeCompare(String(b.nickname || ""), "ko"));
        renderRows(allRows);
      });
    });

    approvedFilterBtn.addEventListener("click", () => {
      currentFilter = "approved";
      renderRows(allRows);
    });

    pendingFilterBtn.addEventListener("click", () => {
      currentFilter = "pending";
      renderRows(allRows);
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      location.reload();
    });
  </script>
</body>
</html>
