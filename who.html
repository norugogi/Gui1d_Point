<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>너 누구야</title>
<link rel="stylesheet" href="css/who.css">
<script src="js/access-gate.js"></script>
<link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css" rel="stylesheet">
</head>
<body>

<div class="main">
  <h1 class="title">너 누구야</h1>

  <div class="filters">
    <input id="f_rank" placeholder="필터1: 순위">
    <input id="f_level" placeholder="필터2: 레벨">
    <input id="f_grade" placeholder="필터3: 토벌">

    <select id="f_class">
      <option value="">필터4: 직업</option>
      <option value="AbyssRevenant">심연추적자</option>
      <option value="Enforcer">집행관</option>
      <option value="SolarSentinel">태양감시자</option>
      <option value="RuneScribe">주문각인사</option>
      <option value="MirageBlade">환영검사</option>
      <option value="IncenseArcher">향사수</option>
      <option value="WildWarrior">야만전사</option>
    </select>

    <input id="f_name" placeholder="필터5: 닉네임">
    <button onclick="searchPlayer()">찾기</button>
    <button onclick="resetTracking()">초기화</button>
  </div>

  <div id="trackingBox" style="margin-bottom:12px; color:#bbb;"></div>

  <table class="who-table">
    <thead>
      <tr>
        <th>서버</th>
        <th>순위</th>
        <th>결사</th>
        <th>닉네임</th>
        <th>토벌</th>
        <th>직업</th>
        <th>카운트</th>
      </tr>
    </thead>
    <tbody id="whoBody"></tbody>
  </table>
</div>

<script src="js/who.js"></script>

<div id="serverModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">X</span>
    <h2 id="modalTitle"></h2>

    <table class="who-table">
      <thead>
        <tr>
          <th>순위</th>
          <th>닉네임</th>
          <th>레벨</th>
          <th>직업</th>
        </tr>
      </thead>
      <tbody id="modalBody"></tbody>
    </table>
  </div>
</div>

</body>
</html>
