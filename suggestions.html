<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>건의함</title>
  <script src="js/access-gate.js"></script>
  <style>
    :root {
      --bg: #1e1e1e;
      --panel: #252934;
      --panel-soft: #1d212a;
      --line: #454b5a;
      --text: #f2f4f8;
      --muted: #c3c7d2;
      --accent: #d4af37;
      --danger: #d45d5d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans KR", "Segoe UI", "Malgun Gothic", sans-serif;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      padding: 18px;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    h2 {
      margin: 0;
      font-size: 24px;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
    }

    label {
      display: block;
      margin: 10px 0 6px;
      color: #dfe3ee;
      font-size: 14px;
    }

    input,
    textarea,
    button {
      font-family: inherit;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--text);
      border-radius: 8px;
      padding: 10px;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #111;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-soft {
      background: #3b4252;
      color: #f3f3f3;
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    #message {
      min-height: 22px;
      font-weight: 700;
    }

    /* 모달 배경 */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.64);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* 모달 카드 */
    .modal-card {
      width: min(920px, 95vw);
      max-height: 82vh;
      overflow: auto;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      padding: 16px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }

    .loading {
      color: var(--muted);
      padding: 14px 0;
    }

    .item {
      background: #1d212a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .item-title {
      font-size: 17px;
      font-weight: 800;
      margin: 0 0 6px;
      color: #f9fbff;
    }

    .item-content {
      white-space: pre-wrap;
      margin: 0 0 8px;
      color: #e4e8f0;
    }

    .meta {
      font-size: 13px;
      color: #b6becd;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="top-row">
        <h2>건의함</h2>
        <div class="actions" style="margin-top:0;">
          <button id="listBtn" type="button" style="display:none;">건의 목록</button>
        </div>
      </div>

      <p>결사 운영에 대한 의견, 건의하실 내용이 있다면 양식에 맞게 작성해주세요.</p>

      <label for="title">제목</label>
      <input id="title" type="text" placeholder="제목을 입력하세요">

      <label for="content">내용</label>
      <textarea id="content" placeholder="건의 내용을 입력하세요"></textarea>

      <label for="name">작성자</label>
      <input id="name" type="text" placeholder="이름 또는 닉네임">

      <div class="actions">
        <button id="saveBtn" type="button">건의 보내기</button>
        <span id="message"></span>
      </div>
    </section>
  </main>

  <div id="listModal" class="modal">
    <section class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-head">
        <h3 style="margin:0;">건의 목록</h3>
        <button id="closeModalBtn" type="button" class="btn-soft">닫기</button>
      </div>
      <div id="modalBody"></div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      addDoc,
      deleteDoc,
      doc,
      Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    // Firebase 프로젝트 설정
    const firebaseConfig = {
      apiKey: "AIzaSyCN1SqXwZWf7Z9r2oMrJGKF0pxfl4zBeTc",
      authDomain: "gui1d-point-db.firebaseapp.com",
      projectId: "gui1d-point-db"
    };

    const ADMIN_KEY = "gui1d_admin_logged_in";
    const ROLE_KEY = "gui1d_user_role";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const titleEl = document.getElementById("title");
    const contentEl = document.getElementById("content");
    const nameEl = document.getElementById("name");
    const saveBtn = document.getElementById("saveBtn");
    const msgEl = document.getElementById("message");

    const listBtn = document.getElementById("listBtn");

    const listModal = document.getElementById("listModal");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const modalBody = document.getElementById("modalBody");

    function showMessage(text, ok = true) {
      msgEl.textContent = text;
      msgEl.style.color = ok ? "#8be28b" : "#ff8b8b";
    }

    // 관리자 상태 UI 반영 (localStorage 유지)
    function applyAdminUI() {
      const role = String(localStorage.getItem(ROLE_KEY) || "");
      const isManager = role === "admin" || role === "manager" || localStorage.getItem(ADMIN_KEY) === "1";
      listBtn.style.display = isManager ? "inline-block" : "none";
    }

    // Timestamp/Date/string 모두 처리해서 화면 표시
    function formatDate(value) {
      if (!value) return "-";
      try {
        if (typeof value.toDate === "function") {
          return value.toDate().toLocaleString("ko-KR");
        }
        if (value.seconds) {
          return new Date(value.seconds * 1000).toLocaleString("ko-KR");
        }
        return new Date(value).toLocaleString("ko-KR");
      } catch (_err) {
        return "-";
      }
    }

    // 최신순 정렬용 숫자 변환
    function dateToNumber(value) {
      if (!value) return 0;
      if (typeof value.toDate === "function") return value.toDate().getTime();
      if (value.seconds) return value.seconds * 1000;
      const t = new Date(value).getTime();
      return Number.isNaN(t) ? 0 : t;
    }

    // 일반 사용자: 건의 저장
    saveBtn.addEventListener("click", async () => {
      const title = titleEl.value.trim();
      const content = contentEl.value.trim();
      const name = nameEl.value.trim();

      if (!title || !content || !name) {
        showMessage("제목/내용/작성자를 모두 입력해주세요.", false);
        return;
      }

      saveBtn.disabled = true;
      showMessage("저장 중...", true);

      try {
        await addDoc(collection(db, "suggestions"), {
          title,
          content,
          name,
          // 현재 날짜 자동 저장
          date: Timestamp.now()
        });

        titleEl.value = "";
        contentEl.value = "";
        nameEl.value = "";
        showMessage("저장 완료", true);
      } catch (err) {
        showMessage("저장 실패: " + String(err), false);
      } finally {
        saveBtn.disabled = false;
      }
    });

    // 목록 모달 열기 + 로딩 표시
    listBtn.addEventListener("click", async () => {
      const role = String(localStorage.getItem(ROLE_KEY) || "");
      if (!(role === "admin" || role === "manager" || localStorage.getItem(ADMIN_KEY) === "1")) {
        showMessage("관리자 로그인 후 이용 가능합니다.", false);
        return;
      }

      listModal.style.display = "flex";
      modalBody.innerHTML = '<div class="loading">불러오는 중...</div>';

      try {
        const snap = await getDocs(collection(db, "suggestions"));

        // 최신순(date 내림차순)
        const rows = snap.docs
          .map((d) => ({ id: d.id, ...d.data() }))
          .sort((a, b) => dateToNumber(b.date) - dateToNumber(a.date));

        if (!rows.length) {
          modalBody.innerHTML = '<div class="loading">데이터가 없습니다.</div>';
          return;
        }

        modalBody.innerHTML = rows.map((row) => `
          <article class="item" data-id="${row.id}">
            <h4 class="item-title">${escapeHtml(row.title || "-")}</h4>
            <p class="item-content">${escapeHtml(row.content || "-")}</p>
            <div class="meta">
              <span>작성자: ${escapeHtml(row.name || "-")}</span>
              <span>작성일: ${escapeHtml(formatDate(row.date))}</span>
            </div>
            <button type="button" class="btn-danger del-btn" data-id="${row.id}">삭제</button>
          </article>
        `).join("");

        // 각 항목 삭제 버튼 바인딩
        modalBody.querySelectorAll(".del-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-id");
            if (!id) return;
            if (!window.confirm("이 건의사항을 삭제할까요?")) return;

            try {
              await deleteDoc(doc(db, "suggestions", id));
              btn.closest(".item")?.remove();
              if (!modalBody.querySelector(".item")) {
                modalBody.innerHTML = '<div class="loading">데이터가 없습니다.</div>';
              }
            } catch (err) {
              window.alert("삭제 실패: " + String(err));
            }
          });
        });
      } catch (err) {
        modalBody.innerHTML = '<div class="loading" style="color:#ff8b8b;">불러오기 실패: ' + escapeHtml(String(err)) + "</div>";
      }
    });

    // 모달 닫기
    closeModalBtn.addEventListener("click", () => {
      listModal.style.display = "none";
    });

    // 팝업 외부 클릭 시 닫기
    listModal.addEventListener("click", (e) => {
      if (e.target === listModal) {
        listModal.style.display = "none";
      }
    });

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // 새로고침/탭 전환/다른 페이지 로그인 상태 변경 시에도 관리자 버튼 상태 동기화
    applyAdminUI();
    window.addEventListener("storage", applyAdminUI);
    window.addEventListener("focus", applyAdminUI);
    document.addEventListener("visibilitychange", applyAdminUI);
    setInterval(applyAdminUI, 1000);
  </script>
</body>
</html>
