<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>루비 공헌도</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/access-gate.js"></script>
</head>
<body class="no-sidebar">
  <div class="main ruby-page">
    <div class="title">루비 공헌도 순위</div>

    <div class="center">
      <select id="groupFilter">
        <option value="all">전체</option>
        <option value="DOG">DOG</option>
        <option value="CAT">CAT</option>
      </select>

      <select id="seasonFilter"></select>
      <select id="weekFilter"></select>
    </div>

    <div class="bar-wrap">
      <div id="rubyBar" class="bar"></div>
    </div>

    <div class="center" id="rubyText"></div>
    <div class="center" id="rubyPercent"></div>

    <div class="ruby-container">
      <table id="rubyTableWrap">
        <thead>
          <tr>
            <th>순위</th>
            <th>시즌</th>
            <th>주차</th>
            <th>결사</th>
            <th>닉네임</th>
            <th>총 누적</th>
            <th>주간 공헌도</th>
          </tr>
        </thead>
        <tbody id="rubyTable"></tbody>
      </table>
    </div>
  </div>

  <script src="js/ruby.js"></script>
</body>
</html>
